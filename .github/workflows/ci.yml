name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# 同一 PR 多次 push 时取消旧 run（节省 CI 资源）
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Typecheck + Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        # version 从 package.json 的 packageManager 字段自动读取（pnpm@11.8.0）
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Generate Prisma Client（src/prisma/client 被 gitignore，CI 必须生成）
        run: pnpm --filter @meimart/api exec prisma generate
      - name: Typecheck all workspaces
        run: pnpm -r typecheck
      - name: Run all tests
        run: pnpm -r test

  contract:
    name: Contract Consistency (zod → OpenAPI → TS types)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        # version 从 package.json 的 packageManager 字段自动读取（pnpm@11.8.0）
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Generate Prisma Client（contract job 也需要）
        run: pnpm --filter @meimart/api exec prisma generate
      - name: Regenerate OpenAPI from zod
        run: pnpm --filter @meimart/api-contract gen:openapi
      - name: Regenerate TS types from OpenAPI
        run: pnpm --filter @meimart/shared-types gen:types
      - name: Verify generated files are up-to-date
        run: |
          if ! git diff --exit-code; then
            echo "❌ Generated files are out of date. Run:"
            echo "   pnpm --filter @meimart/api-contract gen:openapi"
            echo "   pnpm --filter @meimart/shared-types gen:types"
            echo "   Then commit the changes."
            exit 1
          fi
          echo "✅ Generated files are up-to-date"

  security:
    name: Dependency Audit (high+)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        # version 从 package.json 的 packageManager 字段自动读取（pnpm@11.8.0）
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Audit for high/critical vulnerabilities
        run: pnpm audit --audit-level=high
        continue-on-error: false

  build:
    name: Build (api + admin-web)
    runs-on: ubuntu-latest
    needs: [quality, contract]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        # version 从 package.json 的 packageManager 字段自动读取（pnpm@11.8.0）
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Generate Prisma Client（build 也需要类型）
        run: pnpm --filter @meimart/api exec prisma generate
      - name: Build API (NestJS)
        run: pnpm --filter @meimart/api build
      - name: Build admin-web (Next.js)
        run: pnpm --filter @meimart/admin-web build
        env:
          # Next.js build 不需要真实 DATABASE_URL（只是静态构建）
          NEXT_TELEMETRY_DISABLED: '1'
