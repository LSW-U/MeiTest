paths:
  /api/v1/common/auth/login-password:
    post:
      tags:
        - auth
      description: 密码登录（W 流程正式 endpoint，2026-06-24 加；deviceType 服务端按 role 推断）
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                phone:
                  type: string
                  minLength: 1
                password:
                  type: string
                  minLength: 1
              required:
                - phone
                - password
      responses:
        "200":
          description: 登录成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                      role:
                        type: string
                        enum: *a1
                      phone:
                        type: string
                        nullable: true
                      email:
                        type: string
                        nullable: true
                      name:
                        type: string
                        nullable: true
                      avatarUrl:
                        type: string
                        nullable: true
                      status:
                        type: string
                        enum: *a16
                    required:
                      - id
                      - role
                      - phone
                      - email
                      - name
                      - avatarUrl
                      - status
                  accessToken:
                    type: string
                  refreshToken:
                    type: string
                required:
                  - user
                  - accessToken
                  - refreshToken
        "401":
          description: LOGIN_FAILED
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                      - false
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        pattern: ^E-[A-Z]+-\d{3}$|^E-HTTP-\d{3}$
                      message:
                        type: string
                      details:
                        type: object
                        additionalProperties:
                          nullable: true
                    required:
                      - code
                      - message
                required:
                  - success
                  - error
  /api/v1/common/auth/login-sms:
    post:
      tags:
        - auth
      description: SMS 验证码登录（不存在自动注册 customer）
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                phone:
                  type: string
                  minLength: 1
                smsCode:
                  type: string
                  minLength: 1
              required:
                - phone
                - smsCode
      responses:
        "200":
          description: 登录成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                      role:
                        type: string
                        enum: *a1
                      phone:
                        type: string
                        nullable: true
                      email:
                        type: string
                        nullable: true
                      name:
                        type: string
                        nullable: true
                      avatarUrl:
                        type: string
                        nullable: true
                      status:
                        type: string
                        enum: *a16
                    required:
                      - id
                      - role
                      - phone
                      - email
                      - name
                      - avatarUrl
                      - status
                  accessToken:
                    type: string
                  refreshToken:
                    type: string
                required:
                  - user
                  - accessToken
                  - refreshToken
        "401":
          description: SMS_CODE_INVALID
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                      - false
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        pattern: ^E-[A-Z]+-\d{3}$|^E-HTTP-\d{3}$
                      message:
                        type: string
                      details:
                        type: object
                        additionalProperties:
                          nullable: true
                    required:
                      - code
                      - message
                required:
                  - success
                  - error
  /api/v1/common/auth/sms-code:
    post:
      tags:
        - auth
      description: 发送 SMS 验证码（stub 固定 123456，标 [SMS_STUB]，W6 切东帝汶本地）
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                phone:
                  type: string
                  minLength: 1
                scene:
                  type: string
                  enum: *a17
                  default: LOGIN
              required:
                - phone
      responses:
        "200":
          description: 已发送（stub）
          content:
            application/json:
              schema:
                type: object
                properties:
                  expireIn:
                    type: integer
                    minimum: 0
                    exclusiveMinimum: true
                required:
                  - expireIn
        "429":
          description: SMS_RATE_LIMIT
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                      - false
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        pattern: ^E-[A-Z]+-\d{3}$|^E-HTTP-\d{3}$
                      message:
                        type: string
                      details:
                        type: object
                        additionalProperties:
                          nullable: true
                    required:
                      - code
                      - message
                required:
                  - success
                  - error
  /api/v1/common/auth/password-reset:
    post:
      tags:
        - auth
      description: SMS 找回密码
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                phone:
                  type: string
                  minLength: 1
                smsCode:
                  type: string
                  minLength: 1
                newPassword:
                  type: string
                  minLength: 8
                  pattern: "[a-zA-Z]"
              required:
                - phone
                - smsCode
                - newPassword
      responses:
        "200":
          description: 重置成功
        "401":
          description: SMS_CODE_INVALID
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                      - false
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        pattern: ^E-[A-Z]+-\d{3}$|^E-HTTP-\d{3}$
                      message:
                        type: string
                      details:
                        type: object
                        additionalProperties:
                          nullable: true
                    required:
                      - code
                      - message
                required:
                  - success
                  - error
        "404":
          description: PHONE_NOT_FOUND
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                      - false
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        pattern: ^E-[A-Z]+-\d{3}$|^E-HTTP-\d{3}$
                      message:
                        type: string
                      details:
                        type: object
                        additionalProperties:
                          nullable: true
                    required:
                      - code
                      - message
                required:
                  - success
                  - error
  /api/v1/common/auth/register:
    post:
      tags:
        - auth
      description: 注册（必传 smsCode，dev stub 固定 123456；email optional 走密码+SMS 主路径）
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                phone:
                  type: string
                  minLength: 1
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
                  pattern: "[a-zA-Z]"
                name:
                  type: string
                smsCode:
                  type: string
              required:
