      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                      - true
                  data:
                    type: object
                    properties:
                      key:
                        type: string
                        minLength: 1
                        maxLength: 128
                      value:
                        type: string
                      description:
                        type: string
                        nullable: true
                      updatedAt:
                        type: string
                        format: date-time
                      updatedBy:
                        type: string
                        nullable: true
                        format: uuid
                    required:
                      - key
                      - value
                      - description
                      - updatedAt
                      - updatedBy
                  message:
                    type: string
                required:
                  - success
                  - data
        "404":
          description: CONFIG_NOT_FOUND
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                      - false
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        pattern: ^E-(AUTH|COMMON|ORDER|PAYMENT|WAREHOUSE|USER|CATALOG|DISPATCH|RIDER|NOTIFY|PLATFORM|SETTLE|IM|AUDIT)-\d{3}$|^E-HTTP-\d{3}$
                      message:
                        type: string
                      details:
                        type: object
                        additionalProperties:
                          nullable: true
                    required:
                      - code
                      - message
                required:
                  - success
                  - error
