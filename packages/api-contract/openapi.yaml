openapi: 3.0.3
info:
  title: MeiMart API
  version: "0.3"
  description: MeiMart 三端统一后端 API（契约 v0.2 基础 + v0.3 决策覆盖）
servers:
  - url: http://localhost:3000/api/v1
    description: dev
  - url: https://staging-api.meimart.xxx/api/v1
    description: staging
tags:
  - name: auth
    description: 认证模块
  - name: user
    description: 用户资料
  - name: address
    description: 收货地址
  - name: favorite
    description: 收藏
  - name: notification
    description: 站内通知
  - name: shop
    description: 商家（单一）
  - name: warehouse
    description: 仓库（多）
  - name: product
    description: 商品
  - name: sku
    description: 商品规格 SKU
  - name: category
    description: 商品分类
  - name: banner
    description: 首页 Banner
  - name: inventory
    description: 库存（含仓库匹配）
  - name: pricing
    description: 配送费 + 起送价
  - name: cart
    description: 购物车
  - name: order
    description: 订单
  - name: payment
    description: 支付
  - name: platform
    description: 平台 dashboard / 审计 / 系统配置
  - name: settle
    description: 结算单 + 提现审核（M W3）
  - name: im
    description: IM 自建 WebSocket 用户签名（M W3）
components:
  schemas:
    JwtPayload:
      type: object
      properties:
        sub:
          type: string
          format: uuid
        role:
          type: string
          enum: &a1
            - super_admin
            - customer
            - rider
            - warehouse_staff
            - customer_service
        deviceType:
          type: string
          enum:
            - client_app
            - rider_app
            - admin_web
            - system
        iat:
          type: integer
        exp:
          type: integer
        jti:
          type: string
          format: uuid
      required:
        - sub
        - role
        - deviceType
        - iat
        - exp
        - jti
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          enum:
            - false
        error:
          type: object
          properties:
            code:
              type: string
              pattern: ^E-[A-Z]+-\d{3}$|^E-HTTP-\d{3}$
            message:
              type: string
            details:
              type: object
              additionalProperties:
                nullable: true
          required:
            - code
            - message
      required:
        - success
        - error
    LoginRequest:
      type: object
      properties:
        identifier:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 1
      required:
        - identifier
        - password
    LoginPasswordRequest:
      type: object
      properties:
        phone:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 1
      required:
        - phone
        - password
    LoginSmsRequest:
      type: object
      properties:
        phone:
          type: string
          minLength: 1
        smsCode:
          type: string
          minLength: 1
      required:
        - phone
        - smsCode
    LoginResponseData:
      type: object
      properties:
        user:
          type: object
          properties:
            id:
              type: string
              format: uuid
            role:
              type: string
              enum: *a1
            phone:
              type: string
              nullable: true
            email:
              type: string
              nullable: true
            name:
              type: string
              nullable: true
            avatarUrl:
              type: string
              nullable: true
            status:
              type: string
              enum: &a16
                - ACTIVE
                - SUSPENDED
                - DELETED
          required:
            - id
            - role
            - phone
            - email
            - name
            - avatarUrl
            - status
        accessToken:
          type: string
        refreshToken:
          type: string
      required:
        - user
        - accessToken
        - refreshToken
    RegisterRequest:
      type: object
      properties:
        phone:
          type: string
          minLength: 1
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
          pattern: "[a-zA-Z]"
        name:
          type: string
        smsCode:
          type: string
      required:
        - phone
        - password
    RefreshRequest:
      type: object
      properties:
        refreshToken:
          type: string
          minLength: 1
      required:
        - refreshToken
    RefreshResponseData:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
      required:
        - accessToken
        - refreshToken
    LogoutRequest:
      type: object
      properties:
        refreshToken:
          type: string
          minLength: 1
      required:
        - refreshToken
    SendSmsRequest:
      type: object
      properties:
        phone:
          type: string
          minLength: 1
        type:
          type: string
          enum:
            - REGISTER
            - LOGIN
            - RESET_PASSWORD
      required:
        - phone
        - type
    SendSmsCodeRequest:
      type: object
      properties:
        phone:
          type: string
          minLength: 1
        scene:
          type: string
          enum: &a17
            - REGISTER
            - LOGIN
            - RESET_PASSWORD
          default: LOGIN
      required:
        - phone
    SendSmsResponseData:
      type: object
      properties:
        expireIn:
          type: integer
          minimum: 0
          exclusiveMinimum: true
      required:
        - expireIn
    ResetPasswordRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        code:
          type: string
          minLength: 1
        newPassword:
          type: string
          minLength: 8
          pattern: "[a-zA-Z]"
      required:
        - email
        - code
        - newPassword
    PasswordResetRequest:
      type: object
      properties:
        phone:
          type: string
          minLength: 1
        smsCode:
          type: string
          minLength: 1
        newPassword:
          type: string
          minLength: 8
          pattern: "[a-zA-Z]"
      required:
        - phone
        - smsCode
        - newPassword
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        phone:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
          format: email
        name:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true
        role:
          type: string
          enum: *a1
        status:
          type: string
          enum: &a18
            - ACTIVE
            - SUSPENDED
            - DELETED
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - phone
        - email
        - name
        - avatarUrl
        - role
        - status
        - createdAt
        - updatedAt
    UpdateProfileRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        avatarUrl:
          type: string
          format: uri
    ChangePasswordRequest:
      type: object
      properties:
        oldPassword:
          type: string
          minLength: 1
        newPassword:
          type: string
          minLength: 8
          pattern: "[a-zA-Z]"
      required:
        - oldPassword
        - newPassword
    Address:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        name:
          type: string
        phone:
          type: string
        region:
          type: object
          properties:
            province:
              type: string
            city:
              type: string
            district:
              type: string
          required:
            - province
            - city
        detail:
          type: string
        lat:
          type: number
          nullable: true
        lng:
          type: number
          nullable: true
        isDefault:
          type: boolean
        tag:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - userId
        - name
        - phone
        - region
        - detail
        - lat
        - lng
        - isDefault
        - tag
        - createdAt
        - updatedAt
    CreateAddressRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        phone:
          type: string
          minLength: 1
        region:
          type: object
          properties:
            province:
              type: string
            city:
              type: string
            district:
              type: string
          required:
            - province
            - city
        detail:
          type: string
          minLength: 1
        lat:
          type: number
          nullable: true
        lng:
          type: number
          nullable: true
        isDefault:
          type: boolean
        tag:
          type: string
          nullable: true
      required:
        - name
        - phone
        - region
        - detail
    UpdateAddressRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        phone:
          type: string
          minLength: 1
        region:
          type: object
          properties:
            province:
              type: string
            city:
              type: string
            district:
              type: string
          required:
            - province
            - city
        detail:
          type: string
          minLength: 1
        lat:
          type: number
          nullable: true
        lng:
          type: number
          nullable: true
        isDefault:
          type: boolean
        tag:
          type: string
          nullable: true
    FavoriteToggleRequest:
      type: object
      properties:
        productId:
          type: string
          format: uuid
      required:
        - productId
    FavoriteToggleResponse:
      type: object
      properties:
        isFavorite:
          type: boolean
      required:
        - isFavorite
    NotificationItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        type:
          type: string
          enum: &a19
            - ORDER_UPDATE
            - PROMOTION
            - SYSTEM
        title:
          type: object
          additionalProperties:
            type: string
        content:
          type: object
          additionalProperties:
            type: string
        isRead:
          type: boolean
        data:
          type: object
          nullable: true
          additionalProperties:
            nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - userId
        - type
        - title
        - content
        - isRead
        - data
        - createdAt
    MarkNotificationReadResponse:
      type: object
      properties:
        success:
          type: boolean
      required:
        - success
    Shop:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: object
          additionalProperties:
            type: string
        logoUrl:
          type: string
          nullable: true
          format: uri
        phone:
          type: string
        address:
          type: string
        status:
          type: string
          enum: &a2
            - ACTIVE
            - INACTIVE
        businessHours:
          type: string
          nullable: true
        announcement:
          type: object
          additionalProperties:
            type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - logoUrl
        - phone
        - address
        - status
        - businessHours
        - createdAt
        - updatedAt
    UpdateShopRequest:
      type: object
      properties:
        name:
          type: object
          additionalProperties:
            type: string
        logoUrl:
          type: string
          nullable: true
          format: uri
        phone:
          type: string
        address:
          type: string
        status:
          type: string
          enum: *a2
        businessHours:
          type: string
          nullable: true
        announcement:
          type: object
          additionalProperties:
            type: string
    Warehouse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
          pattern: ^W\d{2}$
        name:
          type: object
          additionalProperties:
            type: string
        coverageArea:
          type: object
          nullable: true
          properties:
            type:
              type: string
              enum:
                - Polygon
            coordinates:
              type: array
              items:
                type: array
                items:
                  type: array
                  items:
                    type: number
          required:
            - type
            - coordinates
        centerPoint:
          type: object
          nullable: true
          properties:
            type:
              type: string
              enum:
                - Point
            coordinates:
              type: array
              items:
                type: number
              minItems: 2
              maxItems: 2
          required:
            - type
            - coordinates
        centerLat:
          type: number
          nullable: true
        centerLng:
          type: number
          nullable: true
        address:
          type: string
        operatingHours:
          type: object
          nullable: true
          properties:
            mon: &a3
              type: object
              properties:
                open:
                  type: string
                  pattern: ^\d{2}:\d{2}$
                close:
                  type: string
                  pattern: ^\d{2}:\d{2}$
              required:
                - open
                - close
            tue: *a3
            wed: *a3
            thu: *a3
            fri: *a3
            sat: *a3
            sun: *a3
        deliveryFee:
          type: integer
          minimum: 0
          maximum: 999999
          default: 0
        isActive:
          type: boolean
          default: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - code
        - name
        - coverageArea
        - centerPoint
        - centerLat
        - centerLng
        - address
        - operatingHours
        - createdAt
        - updatedAt
    UpsertWarehouseRequest:
      type: object
      properties:
        code:
          type: string
          pattern: ^W\d{2}$
        name:
          type: object
          additionalProperties:
            type: string
        coverageArea:
          type: object
          nullable: true
          properties:
            type:
              type: string
              enum:
                - Polygon
            coordinates:
              type: array
              items:
                type: array
                items:
                  type: array
                  items:
                    type: number
          required:
            - type
            - coordinates
        centerLat:
          type: number
        centerLng:
          type: number
        address:
          type: string
        operatingHours:
          type: object
          nullable: true
          properties:
            mon: &a4
              type: object
              properties:
                open:
                  type: string
                  pattern: ^\d{2}:\d{2}$
                close:
                  type: string
                  pattern: ^\d{2}:\d{2}$
              required:
                - open
                - close
            tue: *a4
            wed: *a4
            thu: *a4
            fri: *a4
            sat: *a4
            sun: *a4
        deliveryFee:
          type: integer
          minimum: 0
          maximum: 999999
        isActive:
          type: boolean
      required:
        - name
        - coverageArea
        - centerLat
        - centerLng
        - address
        - operatingHours
        - deliveryFee
        - isActive
    MatchWarehouseRequest:
      type: object
      properties:
        lat:
          type: number
        lng:
          type: number
      required:
        - lat
        - lng
    Product:
      type: object
      properties:
        id:
          type: string
          format: uuid
        shopId:
          type: string
          format: uuid
        categoryId:
          type: string
          nullable: true
          format: uuid
        name:
          type: object
          additionalProperties:
            type: string
        description:
          type: object
          nullable: true
          additionalProperties:
            type: string
        mainImage:
          type: string
        images:
          type: array
          items:
            type: string
        status:
          type: string
          enum: &a5
            - ACTIVE
            - INACTIVE
            - OUT_OF_STOCK
        unit:
          type: object
          additionalProperties:
            type: string
        priceMin:
          type: integer
          minimum: 0
          maximum: 999999
        salesCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - shopId
        - categoryId
        - name
        - description
        - mainImage
        - images
        - status
        - unit
        - priceMin
        - salesCount
        - createdAt
        - updatedAt
    ProductSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: object
          additionalProperties:
            type: string
        mainImage:
          type: string
        priceMin:
          type: integer
          minimum: 0
          maximum: 999999
        status:
          type: string
          enum: *a5
        salesCount:
          type: integer
      required:
        - id
        - name
        - mainImage
        - priceMin
        - status
        - salesCount
    CreateProductRequest:
      type: object
      properties:
        categoryId:
          type: string
          nullable: true
          format: uuid
        name:
          type: object
          additionalProperties:
            type: string
        description:
          type: object
          nullable: true
          additionalProperties:
            type: string
        mainImage:
          type: string
        images:
          type: array
          items:
            type: string
          default: &a6 []
        unit:
          type: object
          additionalProperties:
            type: string
        status:
          type: string
          enum: *a5
      required:
        - name
        - mainImage
        - unit
    UpdateProductRequest:
      type: object
      properties:
        categoryId:
          type: string
          nullable: true
          format: uuid
        name:
          type: object
          additionalProperties:
            type: string
        description:
          type: object
          nullable: true
          additionalProperties:
            type: string
        mainImage:
          type: string
        images:
          type: array
          items:
            type: string
          default: *a6
        unit:
          type: object
          additionalProperties:
            type: string
        status:
          type: string
          enum: *a5
    UpdateProductStatusRequest:
      type: object
      properties:
        status:
          type: string
          enum: *a5
      required:
        - status
    Sku:
      type: object
      properties:
        id:
          type: string
          format: uuid
        productId:
          type: string
          format: uuid
        name:
          type: object
          additionalProperties:
            type: string
        attributes:
          type: object
          additionalProperties:
            nullable: true
        price:
          type: integer
          minimum: 0
          maximum: 999999
        imageUrl:
          type: string
          nullable: true
        status:
          type: string
          enum: &a7
            - ACTIVE
            - INACTIVE
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - productId
        - name
        - attributes
        - price
        - imageUrl
        - status
        - createdAt
        - updatedAt
    CreateSkuRequest:
      type: object
      properties:
        name:
          type: object
          additionalProperties:
            type: string
        attributes:
          type: object
          additionalProperties:
            nullable: true
        price:
          type: integer
          minimum: 0
          maximum: 999999
        imageUrl:
          type: string
          nullable: true
        status:
          type: string
          enum: *a7
      required:
        - name
        - attributes
        - price
    UpdateSkuRequest:
      type: object
      properties:
        name:
          type: object
          additionalProperties:
            type: string
        attributes:
          type: object
          additionalProperties:
            nullable: true
        price:
          type: integer
          minimum: 0
          maximum: 999999
        imageUrl:
          type: string
          nullable: true
        status:
          type: string
          enum: *a7
    Category:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: object
          additionalProperties:
            type: string
        iconUrl:
          type: string
        parentId:
          type: string
          nullable: true
          format: uuid
        sortOrder:
          type: integer
      required:
        - id
        - name
        - iconUrl
        - parentId
        - sortOrder
    CreateCategoryRequest:
      type: object
      properties:
        name:
          type: object
          additionalProperties:
            type: string
        iconUrl:
          type: string
        parentId:
          type: string
          nullable: true
          format: uuid
        sortOrder:
          type: integer
      required:
        - name
        - iconUrl
    UpdateCategoryRequest:
      type: object
      properties:
        name:
          type: object
          additionalProperties:
            type: string
        iconUrl:
          type: string
        parentId:
          type: string
          nullable: true
          format: uuid
        sortOrder:
          type: integer
    Banner:
      type: object
      properties:
        id:
          type: string
          format: uuid
        imageUrl:
          type: string
        alt:
          type: object
          nullable: true
          additionalProperties:
            type: string
        linkType:
          type: string
          enum: &a28
            - PRODUCT
            - CATEGORY
            - URL
            - NONE
        linkValue:
          type: string
          nullable: true
        sortOrder:
          type: integer
        status:
          type: string
          enum: &a29
            - ACTIVE
            - INACTIVE
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - imageUrl
        - alt
        - linkType
        - linkValue
        - sortOrder
        - status
        - createdAt
        - updatedAt
    CreateBannerRequest:
      type: object
      properties:
        imageUrl:
          type: string
        alt:
          type: object
          nullable: true
          additionalProperties:
            type: string
        linkType:
          type: string
          enum: &a8
            - PRODUCT
            - CATEGORY
            - URL
            - NONE
        linkValue:
          type: string
          nullable: true
        sortOrder:
          type: integer
        status:
          type: string
          enum: &a9
            - ACTIVE
            - INACTIVE
      required:
        - imageUrl
        - linkType
    UpdateBannerRequest:
      type: object
      properties:
        imageUrl:
          type: string
        alt:
          type: object
          nullable: true
          additionalProperties:
            type: string
        linkType:
          type: string
          enum: *a8
        linkValue:
          type: string
          nullable: true
        sortOrder:
          type: integer
        status:
          type: string
          enum: *a9
    Order:
      type: object
      properties:
        id:
          type: string
          format: uuid
        orderNo:
          type: string
          pattern: ^MM\d{14}$
        userId:
          type: string
          format: uuid
        warehouseId:
          type: string
          format: uuid
        status:
          type: string
          enum: &a11
            - PENDING_PAYMENT
            - PENDING_CONFIRM
            - CONFIRMED
            - PICKED
            - OUT_FOR_DELIVERY
            - DELIVERED_PAID
            - DELIVERED
            - DELIVERED_UNPAID
            - COMPLETED
            - CANCELLED
        items:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                format: uuid
              productId:
                type: string
                format: uuid
              skuId:
                type: string
                format: uuid
              productName:
                type: string
              productImage:
                type: string
              skuName:
                type: string
              unitPrice:
                type: integer
                minimum: 0
                maximum: 999999
              quantity:
                type: integer
                minimum: 0
                exclusiveMinimum: true
              subtotal:
                type: integer
                minimum: 0
                maximum: 999999
            required:
              - id
              - productId
